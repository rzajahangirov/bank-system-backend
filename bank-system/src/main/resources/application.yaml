spring:
  application:
    name: bank-system

  datasource:
    url: jdbc:postgresql://localhost:5432/bank_system_backend
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    com.bank_system: DEBUG
    org.springframework.security: WARN
